<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --red:#df2531;
  --black:#000000;
}

/* Base */
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0505 0%,#000 70%);
  overflow-x:hidden;
}

/* Scanlines (tension) */
.scanlines{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.35) 50%),
    linear-gradient(90deg,rgba(223,37,49,.08),transparent);
  background-size:100% 2px,3px 100%;
  pointer-events:none;
  z-index:999;
}

/* Scroll glow (engagement) */
.scroll-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at center,rgba(223,37,49,.14),transparent 70%);
  opacity:0;
  transition:.15s;
  z-index:10;
}

/* Cards */
.card{
  background:#000;
  border:1px solid #111;
  overflow:hidden;
  transition:.25s ease;
  will-change:transform, box-shadow;
}
.card:hover{
  border-color:var(--red);
  box-shadow:0 0 18px rgba(223,37,49,.45);
}
.card:active{
  transform:scale(.95);
  box-shadow:0 0 35px rgba(223,37,49,.7);
}

/* Images */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.85;
  transition:.6s ease;
  filter:contrast(1) saturate(1);
}
.card:hover img,
.card:active img{
  opacity:1;
  transform:scale(1.12);
  filter:contrast(1.15) saturate(1.2);
}

/* Pulse on hover (heartbeat mimic) */
@keyframes pulseRed{
  0%{ box-shadow:0 0 10px rgba(223,37,49,.3); }
  50%{ box-shadow:0 0 30px rgba(223,37,49,.6); }
  100%{ box-shadow:0 0 10px rgba(223,37,49,.3); }
}
.card:hover{ animation:pulseRed 1.6s infinite; }

/* Modal */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
#modal img{
  max-width:100%;
  max-height:100%;
  border:1px solid rgba(223,37,49,.4);
  box-shadow:0 0 40px rgba(223,37,49,.45);
}
</style>
</head>

<body>

<div class="scanlines"></div>
<div class="scroll-glow" id="scrollGlow"></div>

<!-- TOP LOGO -->
<header class="flex justify-center py-4">
  <img src="logo.png" class="h-10" alt="">
</header>

<!-- CENTER ICON (fixation point) -->
<div class="flex justify-center mb-3">
  <i data-lucide="aperture" class="w-9 h-9 text-[#df2531]"></i>
</div>

<!-- GALLERY (MOBILE: 4 COLUMNS FORCED) -->
<main class="max-w-7xl mx-auto px-1 pb-20">
  <div id="gallery" class="grid grid-cols-4 gap-[2px] md:grid-cols-4 md:gap-3"></div>
</main>

<!-- MODAL -->
<div id="modal">
  <img id="modalImg" alt="">
</div>

<script>
lucide.createIcons();

/* Images */
const images=[
  'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5',
  'https://images.unsplash.com/photo-1550751827-4bd374c3f58b',
  'https://images.unsplash.com/photo-1516259762381-22954d7d3ad2',
  'https://images.unsplash.com/photo-1515630278258-407f66498911',
  'https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0',
  'https://images.unsplash.com/photo-1558494949-efc5e60dc549',
  'https://images.unsplash.com/photo-1563206767-5b1d97289374',
  'https://images.unsplash.com/photo-1451187580459-43490279c0fa'
];

const gallery=document.getElementById('gallery');
const modal=document.getElementById('modal');
const modalImg=document.getElementById('modalImg');
const glow=document.getElementById('scrollGlow');

/* Render fast */
images.forEach(src=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<img src="${src}" loading="lazy" decoding="async">`;
  d.onclick=()=>{
    // anticipation delay (dopamine)
    d.style.transform='scale(.96)';
    setTimeout(()=>{
      openModal(src);
      d.style.transform='';
    },140);
  };
  gallery.appendChild(d);
});

/* Modal + Back button */
function openModal(src){
  modalImg.src=src;
  modal.style.display='flex';
  history.pushState({modal:true},'');
}
function closeModal(){
  modal.style.display='none';
  modalImg.src='';
}
modal.onclick=closeModal;

/* Back button closes modal */
window.onpopstate=()=>{
  if(modal.style.display==='flex') closeModal();
};

/* Scroll engagement glow */
window.addEventListener('scroll',()=>{
  glow.style.opacity='1';
  clearTimeout(window._sg);
  window._sg=setTimeout(()=>glow.style.opacity='0',120);
});
</script>

</body>
</html>
