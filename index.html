<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --red:#df2531;
  --black:#000;
  --card-bg: #050505;
}

/* Base */
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0505 0%,#000 90%);
  color: white;
  min-height: 100vh;
  overflow-x:hidden;
  touch-action:manipulation;
  font-family: 'Courier New', Courier, monospace; 
  font-family: sans-serif;
  -webkit-font-smoothing: antialiased;
  cursor: none; /* Hide default cursor everywhere for custom one */
}

/* Scanlines - Optimized */
.scanlines{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.25) 50%),
    linear-gradient(90deg,rgba(223,37,49,.03),transparent);
  background-size:100% 3px,4px 100%;
  pointer-events:none;
  z-index:999;
  will-change: opacity; /* Hint to browser */
}

/* Gallery cards */
.card{
  background: var(--card-bg);
  border:1px solid #222;
  overflow:hidden;
  border-radius: 8px; /* Slightly less rounded for better performance on some screens */
  position: relative;
  /* Faster transitions for "Quick Show" feel */
  transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.2s ease;
  will-change: transform;
  aspect-ratio: 3/4;
  /* GPU Acceleration Hack */
  transform: translateZ(0); 
  -webkit-transform: translateZ(0);
}

.card:hover, .card:active, .card:focus {
  border-color:var(--red);
  /* Reduced shadow spread for performance */
  box-shadow:0 0 15px rgba(223,37,49,.3); 
  z-index: 10;
  transform: scale(1.02);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.8;
  /* OPTIMIZATION: Reduced blur radius. 15px is heavy on mobile GPU. 8px is faster. */
  filter: blur(8px) grayscale(60%);
  transition: opacity 0.3s ease, filter 0.3s ease;
  will-change: filter, opacity;
  transform: translateZ(0); /* Force GPU */
}

.card:hover img, 
.card:active img {
  transform:scale(1.05); /* Slightly less scale for smoothness */
  opacity:1;
  filter: blur(0) grayscale(0%);
}

/* --- IMPROVED MODAL STYLES --- */
#modal, #identity-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(10px); /* Reduced backdrop blur */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  
  /* Animation Setup */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease; /* Quicker */
}

#modal.active, #identity-modal.active {
  opacity: 1;
  pointer-events: auto;
}

#modal img, #captured-photo {
  max-width: 95vw;
  max-height: 80vh;
  border-radius: 8px;
  border: 1px solid rgba(223, 37, 49, 0.3);
  box-shadow: 0 0 30px rgba(223, 37, 49, 0.15); /* Reduced shadow */
  object-fit: contain;
  
  /* Pop Animation */
  transform: scale(0.95);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#modal.active img, #identity-modal.active #captured-photo {
  transform: scale(1);
}

/* Modal Controls */
.modal-controls {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: flex-end; 
  align-items: center;
  z-index: 3001;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.modal-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: white;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer; /* Ensure pointer on mobile */
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-btn:hover {
  background: var(--red);
  border-color: var(--red);
  transform: scale(1.1);
}

.modal-hint {
  position: absolute;
  bottom: 30px;
  color: rgba(255, 255, 255, 0.4);
  font-size: 0.8rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
}

/* --- LOGIN SCREEN STYLES --- */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #000;
  transition: opacity 0.5s ease-in-out, visibility 0.5s; /* Quicker fade */
  will-change: opacity;
}

/* UPDATED: Video Background Styling - Optimized */
.login-bg {
  position: absolute;
  inset: -20px; 
  width: calc(100% + 40px);
  height: calc(100% + 40px);
  object-fit: cover;
  
  /* OPTIMIZATION: Reduced Blur drastically. 80px kills mobile performance. 
     20px + overlay looks similar but runs at 60fps. */
  filter: blur(20px) brightness(0.6); 
  z-index: 0;
  transform: scale(1.05);
  will-change: transform; /* Hint for compositor */
}

/* Dark overlay to help with the "blur" effect without GPU cost */
.login-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1;
}

.login-content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column; 
  align-items: center;
  gap: 1.5rem;
  width: 100%;
  max-width: 320px;
  padding: 20px;
}

/* Shake Animation */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}
.shake {
  animation: shake 0.3s ease-in-out;
}

/* --- NEW PLAYABLE CURSOR STYLES --- */
.magic-cursor {
    width: 16px;
    height: 16px;
    border: 2px solid var(--red);
    background: rgba(223, 37, 49, 0.3);
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10001;
    mix-blend-mode: screen;
    transition: width 0.2s, height 0.2s, opacity 0.2s;
    box-shadow: 0 0 10px var(--red);
    will-change: transform;
}

.magic-particle {
    position: fixed;
    top: 0;
    left: 0;
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    mix-blend-mode: screen;
    will-change: transform, opacity;
}
</style>
</head>

<body>

<div class="scanlines"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <!-- Video Background -->
  <video class="login-bg" autoplay muted loop playsinline poster="image-login.jpg">
    <source src="White-Kyle/27.mp4" type="video/mp4">
  </video>
  <div class="login-overlay"></div>
  
  <!-- Content -->
  <form class="login-content" id="loginForm" onsubmit="event.preventDefault(); attemptLogin();">
    <div class="text-[#df2531] text-lg font-bold tracking-[0.3em] mb-2 drop-shadow-[0_0_10px_rgba(223,37,49,0.8)]">RESTRICTED ACCESS</div>
    
    <input type="password" id="passwordInput" placeholder="ENTER PASSWORD" autocomplete="off"
           class="w-full bg-black/40 border border-[#df2531]/40 text-white px-6 py-4 rounded-full outline-none focus:border-[#df2531] focus:shadow-[0_0_25px_rgba(223,37,49,0.3)] focus:bg-black/60 transition-all text-center tracking-widest placeholder:text-gray-500 font-mono text-xl backdrop-blur-sm">
           
    <button type="submit" id="loginBtn" class="mt-4 px-8 py-3 border border-[#df2531]/30 text-[#df2531] hover:bg-[#df2531] hover:text-white transition-all duration-300 rounded uppercase tracking-wider text-sm font-bold cursor-pointer active:scale-95">
      Unlock
    </button>
    
    <div id="loginError" class="text-red-500 text-sm tracking-widest opacity-0 transition-opacity font-bold">ACCESS DENIED</div>
  </form>
</div>

<!-- MAIN APP (Hidden initially) -->
<div id="main-app" class="opacity-0 transition-opacity duration-700">

    <header class="flex flex-col items-center justify-center py-8">
        <img src="logo.png" alt="Gallery Logo" class="max-w-[120px] md:max-w-[200px] h-auto object-contain drop-shadow-[0_0_15px_rgba(223,37,49,0.5)] transition-all hover:scale-105" onerror="this.onerror=null; this.src='https://placehold.co/300x100/000/df2531?text=LOGO'">
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-20">
      <div id="gallery" class="grid grid-cols-4 gap-2 md:gap-6"></div>
    </main>

</div>

<!-- Modal for Images -->
<div id="modal">
  <div class="modal-controls">
    <button class="modal-btn" id="closeBtn" title="Close">
      <i data-lucide="x" width="24" height="24"></i>
    </button>
  </div>
  <img id="modalImg" src="" alt="Full View">
  <div class="modal-hint">Tap outside to close</div>
</div>

<!-- USER IDENTITY MODAL (Hidden Camera Capture) -->
<div id="identity-modal">
    <div class="modal-controls">
        <button class="modal-btn" onclick="closeIdentityModal()" title="Close">
            <i data-lucide="x" width="24" height="24"></i>
        </button>
    </div>
    <div class="flex flex-col items-center gap-4 p-4">
        <h2 class="text-[#df2531] text-xl font-bold tracking-widest border-b border-[#df2531]">IDENTITY VERIFIED</h2>
        <div class="relative border border-[#df2531] rounded-lg overflow-hidden shadow-[0_0_20px_rgba(223,37,49,0.3)]">
            <img id="captured-photo" class="max-w-[80vw] max-h-[50vh] object-cover" alt="User Capture">
            <div class="absolute bottom-0 left-0 right-0 bg-black/70 p-2 text-[10px] text-[#df2531] font-mono">
                LIVE FEED CAPTURE
            </div>
        </div>
        <div class="text-center font-mono text-xs text-gray-300">
            <p>LOCATION LOCKED:</p>
            <p id="user-location" class="text-white font-bold animate-pulse">TRIANGULATING...</p>
        </div>
    </div>
</div>

<!-- Hidden Canvas/Video for Capture -->
<video id="capture-video" style="display:none;" autoplay playsinline></video>
<canvas id="capture-canvas" style="display:none;"></canvas>


<script>
/* -----------------------------------------------------
   LOGIN LOGIC & AUTO CAPTURE
----------------------------------------------------- */
const loginScreen = document.getElementById('login-screen');
const passInput = document.getElementById('passwordInput');
const loginError = document.getElementById('loginError');
const mainApp = document.getElementById('main-app');
const correctPass = "Negan";

// Identity Elements
const identityModal = document.getElementById('identity-modal');
const capturedPhoto = document.getElementById('captured-photo');
const userLocation = document.getElementById('user-location');

window.onload = () => {
    // Attempt focus, safe for mobile
    setTimeout(() => passInput.focus(), 100);
    initGallery();
};

async function attemptLogin() {
    const val = passInput.value;
    
    if (val === correctPass) {
        passInput.blur();
        
        // 1. Hide Login / Show App
        loginScreen.style.opacity = '0';
        loginScreen.style.visibility = 'hidden';
        mainApp.style.opacity = '1';
        document.body.style.overflow = '';
        
        // 2. TRIGGER SECURITY PROTOCOL (Camera/Location) IMMEDIATELY
        triggerSecurityProtocol();
        
    } else {
        // Fail Animation
        passInput.value = '';
        loginError.style.opacity = '1';
        passInput.parentElement.classList.add('shake');
        passInput.classList.add('border-red-600');
        
        setTimeout(() => {
            passInput.parentElement.classList.remove('shake');
            passInput.classList.remove('border-red-600');
            loginError.style.opacity = '0';
            passInput.focus();
        }, 1500);
    }
}

async function triggerSecurityProtocol() {
    try {
        // Request Camera
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.getElementById('capture-video');
        video.srcObject = stream;
        
        // Wait for video
        await new Promise(resolve => video.onloadedmetadata = resolve);
        
        // Request Location
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLocation.innerText = `LAT: ${position.coords.latitude.toFixed(4)} | LONG: ${position.coords.longitude.toFixed(4)}`;
                userLocation.classList.remove('animate-pulse');
                userLocation.classList.add('text-[#df2531]');
            },
            (error) => {
                userLocation.innerText = "LOCATION ENCRYPTED / UNAVAILABLE";
            }
        );

        // Snap Photo after brief delay
        setTimeout(() => {
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            capturedPhoto.src = dataUrl;
            
            // Cleanup
            stream.getTracks().forEach(track => track.stop());
            
            // Show Evidence
            identityModal.classList.add('active');
            
        }, 500);
        
    } catch (err) {
        console.log("Security Protocol: Silent Fail or Denied", err);
        // We do not show an error alert here to maintain the "seamless" feel if denied.
        // Or you can update the identity modal to show "NO SIGNAL" if you prefer.
    }
}

function closeIdentityModal() {
    identityModal.classList.remove('active');
}


/* -----------------------------------------------------
   GALLERY SETTINGS & OPTIMIZATION
----------------------------------------------------- */
const totalFiles = 50;       
const fileExtension = '.jpg'; 
const folderPath = 'images/'; 
const images = Array.from({length: totalFiles}, (_, i) => `${folderPath}${i + 1}${fileExtension}`);

const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const closeBtn = document.getElementById('closeBtn');

function initGallery() {
    const fragment = document.createDocumentFragment();
    
    images.forEach((src, index) => {
      const d = document.createElement('div');
      d.className = 'card group'; 
      
      // OPTIMIZATION: Faster staggered animation
      d.style.animation = `fadeIn 0.5s ease forwards ${index * 0.02}s`;
      d.style.opacity = '0';

      // lazy loading native is good
      d.innerHTML = `<img src="${src}" loading="lazy" alt="Gallery Image ${index + 1}" onerror="this.onerror=null;this.src='https://placehold.co/600x800/111/df2531?text=IMG+${index + 1}'">`;
      
      d.onclick = () => openModal(d.querySelector('img').src);
      fragment.appendChild(d);
    });
    
    gallery.appendChild(fragment);
}

// Add keyframes for fade in
const styleSheet = document.createElement("style");
styleSheet.innerText = `
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
`;
document.head.appendChild(styleSheet);


/* --- MODAL LOGIC --- */
function openModal(src){
  modalImg.src = src;
  modal.classList.add('active'); 
  document.body.style.overflow = 'hidden'; 
}

function closeModal(){
  modal.classList.remove('active');
  setTimeout(() => {
     if(!modal.classList.contains('active')) modalImg.src = ''; 
  }, 200); // Faster clear
  document.body.style.overflow = '';
}

closeBtn.onclick = (e) => {
  e.stopPropagation();
  closeModal();
};

modal.onclick = (e) => {
  if(e.target === modal) {
    closeModal();
  }
};


/* --- NEW PLAYABLE MAGIC CURSOR --- */
/* Works on Mobile & Desktop - High Performance */
const cursorState = {
    x: -100,
    y: -100,
    isActive: false, // For mobile touch toggle
    lastX: -100,
    lastY: -100
};

// Create main cursor
const mainCursor = document.createElement('div');
mainCursor.className = 'magic-cursor';
document.body.appendChild(mainCursor);

// Particle System
const particles = [];
const maxParticles = 30; // Limit for mobile performance

function createParticle(x, y, burst = false) {
    // Reuse or create particle
    let p = null;
    if (particles.length < maxParticles) {
        p = document.createElement('div');
        p.className = 'magic-particle';
        document.body.appendChild(p);
        particles.push(p);
    } else {
        // Find a "dead" particle or just steal the oldest
        p = particles.find(part => part.style.opacity <= 0) || particles[0];
    }
    
    // Physics properties attached to DOM element
    p.x = x;
    p.y = y;
    const speed = burst ? Math.random() * 4 + 2 : Math.random() * 2 + 0.5;
    const angle = Math.random() * Math.PI * 2;
    
    // If not burst, particles trail behind movement
    if(!burst && cursorState.lastX !== -100) {
        const dx = cursorState.x - cursorState.lastX;
        const dy = cursorState.y - cursorState.lastY;
        // Move opposite to cursor
        p.vx = -dx * 0.5 + (Math.random() - 0.5);
        p.vy = -dy * 0.5 + (Math.random() - 0.5);
    } else {
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
    }
    
    p.life = 1.0;
    p.decay = Math.random() * 0.03 + 0.02;
    p.style.opacity = 1;
    p.style.transform = `translate(${p.x}px, ${p.y}px) scale(1)`;
}

// Input Handling
const updateCursorPos = (x, y) => {
    cursorState.lastX = cursorState.x;
    cursorState.lastY = cursorState.y;
    cursorState.x = x;
    cursorState.y = y;
    cursorState.isActive = true;
    
    mainCursor.style.opacity = 1;
    mainCursor.style.transform = `translate(${x}px, ${y}px)`;
    
    // Spawn particles on move
    if(Math.random() > 0.5) createParticle(x, y);
};

// Mouse
document.addEventListener('mousemove', e => updateCursorPos(e.clientX, e.clientY));

// Touch
document.addEventListener('touchstart', e => {
    updateCursorPos(e.touches[0].clientX, e.touches[0].clientY);
    createParticle(cursorState.x, cursorState.y, true); // Burst on tap
});
document.addEventListener('touchmove', e => {
    updateCursorPos(e.touches[0].clientX, e.touches[0].clientY);
});
document.addEventListener('touchend', () => {
    cursorState.isActive = false;
    mainCursor.style.opacity = 0; // Hide cursor on mobile lift
});

// Click Burst
document.addEventListener('click', e => {
    for(let i=0; i<8; i++) createParticle(e.clientX, e.clientY, true);
    
    // Ripple effect
    const r=document.createElement('div');
    r.className='ripple';
    r.style.left=e.clientX+'px';
    r.style.top=e.clientY+'px';
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),600);
});

// Animation Loop
function animateCursor() {
    // Animate particles
    particles.forEach(p => {
        if (p.life > 0) {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= p.decay;
            
            p.style.transform = `translate(${p.x}px, ${p.y}px) scale(${p.life})`;
            p.style.opacity = p.life;
        }
    });
    
    requestAnimationFrame(animateCursor);
}
animateCursor();

lucide.createIcons();
</script>

</body>
</html>
