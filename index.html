<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --red:#df2531;
  --black:#000;
}

/* Base */
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0505 0%,#000 70%);
  overflow-x:hidden;
  touch-action:manipulation;
  cursor: none; /* CRITICAL: Hides default cursor */
}

/* Scanlines */
.scanlines{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.35) 50%),
    linear-gradient(90deg,rgba(223,37,49,.08),transparent);
  background-size:100% 2px,3px 100%;
  pointer-events:none;
  z-index:999;
}

/* Gallery cards */
.card{
  background:#000;
  border:1px solid #111;
  overflow:hidden;
  transition:transform .2s ease, box-shadow .2s ease;
  will-change:transform;
  cursor: none; /* Ensure cursor stays hidden on hover */
}
.card:hover{
  border-color:var(--red);
  box-shadow:0 0 20px rgba(223,37,49,.45);
}
.card:active{
  transform:scale(.94);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.9;
  transition:transform .4s ease, opacity .3s ease;
  will-change:transform;
}
.card:hover img{
  transform:scale(1.1);
  opacity:1;
}

/* Modal */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  cursor: none;
}
#modal img{
  max-width:100%;
  max-height:100%;
  border:1px solid rgba(223,37,49,.4);
  box-shadow:0 0 40px rgba(223,37,49,.5);
}

/* --- SNAKE CURSOR STYLES --- */
.snake-head {
    width: 12px;
    height: 12px;
    background: var(--red);
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 2001;
    box-shadow: 0 0 10px var(--red);
}

.snake-dot {
    width: 10px;
    height: 10px;
    background: var(--red);
    border-radius: 50%;
    position: fixed;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 2000;
    opacity: 0.8;
}

/* Click ripple */
.ripple{
  position:fixed;
  width:10px;
  height:10px;
  border:2px solid rgba(223,37,49,.7);
  border-radius:50%;
  pointer-events:none;
  animation:ripple .5s ease-out forwards;
  z-index:1998;
}
@keyframes ripple{
  to{
    transform:scale(6);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<!-- TOP LOGO -->
<header class="flex justify-center py-4">
  <img src="logo.png" class="h-10" alt="">
</header>

<!-- GALLERY -->
<main class="max-w-7xl mx-auto px-1 pb-20">
  <div id="gallery" class="grid grid-cols-4 gap-[2px]"></div>
</main>

<!-- MODAL -->
<div id="modal">
  <img id="modalImg">
</div>

<script>
lucide.createIcons();

/* Local images */
const images = Array.from({length:10},(_,i)=>`images/${i+1}.png`);

const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

/* Render instantly */
images.forEach(src=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<img src="${src}" loading="eager">`;
  d.onclick=()=>openModal(src);
  gallery.appendChild(d);
});

/* Modal */
function openModal(src){
  modalImg.src=src;
  modal.style.display='flex';
  history.pushState({m:1},'');
}
modal.onclick=()=>closeModal();
function closeModal(){
  modal.style.display='none';
  modalImg.src='';
}
window.onpopstate=()=>{ if(modal.style.display==='flex') closeModal(); };

/* --- SNAKE CURSOR LOGIC (Effect 42) --- */
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
const trail = [];
const trailLength = 18; // Length of the snake

// 1. Create the Main Head
const head = document.createElement('div');
head.className = 'snake-head';
document.body.appendChild(head);

// 2. Create the Trail Segments
for (let i = 0; i < trailLength; i++) {
    const dot = document.createElement('div');
    dot.className = 'snake-dot';
    document.body.appendChild(dot);
    // Store reference and coordinates
    trail.push({ element: dot, x: mouseX, y: mouseY });
}

// 3. Track Mouse
document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

// 4. Track Touch
document.addEventListener('touchstart',e=>{
  mouseX=e.touches[0].clientX;
  mouseY=e.touches[0].clientY;
});
document.addEventListener('touchmove',e=>{
  mouseX=e.touches[0].clientX;
  mouseY=e.touches[0].clientY;
});

// 5. Animation Loop
function animate() {
    // Move Head instantly to mouse (or with slight ease if preferred)
    head.style.left = mouseX + 'px';
    head.style.top = mouseY + 'px';

    // Snake Logic: Each dot follows the point "before" it
    // We start with the point the head is at (or mouse position)
    let prevX = mouseX;
    let prevY = mouseY;

    trail.forEach((t, index) => {
        // 'speed' determines how tight the snake is. 
        // 0.4 is snappy, 0.1 is very loose/laggy.
        const speed = 0.45;

        // Move current dot towards previous dot
        t.x += (prevX - t.x) * speed;
        t.y += (prevY - t.y) * speed;

        t.element.style.left = t.x + 'px';
        t.element.style.top = t.y + 'px';
        
        // Tapering effect: Shrink dots as they get further back
        const scale = 1 - (index / trailLength);
        t.element.style.transform = `translate(-50%, -50%) scale(${scale})`;

        // Update prev coordinates for the NEXT dot in the loop
        prevX = t.x;
        prevY = t.y;
    });

    requestAnimationFrame(animate);
}
animate();

/* Click ripple */
document.addEventListener('click',e=>{
  const r=document.createElement('div');
  r.className='ripple';
  r.style.left=e.clientX+'px';
  r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),500);
});
</script>

</body>
</html>
