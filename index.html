<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Video Gallery</title>
    <style>
        /* --- 1. Base Dark Theme --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #334155;
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0; font-size: 1.2rem; }
        p { margin: 5px 0 0; font-size: 0.8rem; color: #94a3b8; }

        /* --- 2. The Grid Layout (Mobile & PC Friendly) --- */
        .gallery-container {
            display: grid;
            /* Auto-fit: PC pe 2-3 col, Mobile pe 1 col automatically */
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- 3. Individual Video Card --- */
        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }

        .card-header {
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
        }

        /* --- 4. The Protected Video Wrapper --- */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio maintain karega */
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 5. 🛡️ SECURITY MASKS (Har box ke liye apply honge) --- */
        .mask {
            position: absolute;
            z-index: 20; /* Iframe ke upar */
            background: transparent; /* Invisible */
            /* background: rgba(255,0,0,0.3); /* Debugging ke liye uncomment karein */
        }

        /* Right Side Mask (Blocks Share Button) */
        .mask-right {
            top: 0;
            right: 0;
            width: 20%;
            height: 60px;
        }

        /* Left Side Mask (Blocks Mega Logo) */
        .mask-left {
            top: 0;
            left: 0;
            width: 15%;
            height: 60px;
        }

    </style>
</head>
