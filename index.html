<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content</title>
    
    <link rel="icon" type="image/png" href="fav.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Text selection block */
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #00ff00;
        }

        /* Deep Blur Background */
        .glass-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            z-index: 1;
        }

        .mega-watermark {
            position: fixed;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(0, 255, 0, 0.05);
            z-index: 0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        #custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            border: 2px solid #ff0000;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 100000;
            box-shadow: 0 0 15px #ff0000;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid rgba(0, 255, 0, 0.15);
            border-radius: 50px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        #login-panel { display: block; }

        .login-field {
            width: 100%;
            padding: 14px 20px;
            margin: 10px 0;
            background: rgba(0, 255, 0, 0.03);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 25px;
            color: #00ff00;
            font-size: 14px;
            outline: none;
            text-align: center;
        }

        .login-field::placeholder {
            color: rgba(0, 255, 0, 0.3);
            text-transform: uppercase;
        }

        #security-alert { display: none; }

        .center-logo {
            width: 75px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.2));
        }

        .status-pill {
            background: #00ff00;
            color: #000;
            padding: 14px 20px;
            font-weight: 900;
            margin: 20px 0;
            border-radius: 50px;
            font-size: 11px;
        }

        .loader-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 25px;
            border-radius: 10px;
            overflow: hidden;
        }
        
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            transition: width 4s linear;
        }

        .admin-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(0, 255, 0, 0.5);
            padding: 12px 20px;
            border-radius: 50px;
            color: #00ff00;
            text-decoration: none;
            font-size: 11px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="custom-cursor"></div>
    <div class="mega-watermark">MEGA</div>
    <div class="glass-overlay"></div>

    <div id="login-panel" class="glass-card">
        <h2 style="letter-spacing: 5px; margin-bottom: 25px;">Login</h2>
        <input type="text" class="login-field" placeholder="Username">
        <input type="password" class="login-field" placeholder="Password">
        <div class="loader-container">
            <div id="progress-bar"></div>
        </div>
        <p style="color: #444; font-size: 10px; margin-top: 15px; letter-spacing: 1px;"> Check Pixel's...</p>
    </div>

    <div id="security-alert" class="glass-card">
        <img src="logo.png" alt="MEGA" class="center-logo">
        <h1 style="font-size: 20px; letter-spacing: 4px;">ꪀꫀᧁꪖꪀ</h1>
        <p style="color: #666; font-size: 13px; margin: 15px 0;">
            Os Fail: CRITICAL<br>
            UNAUTHORIZED ACCESS DETECTED
        </p>
        <div class="status-pill">
            OS REQ: WINDOWS / LINUX KERNEL
        </div>
        <button style="background:transparent; color:#00ff00; border:1px solid #00ff00; padding:15px; width:100%; border-radius:50px; text-transform:uppercase;">
            INITIALIZE RECOVERY
        </button>
    </div>

    <a href="https://t.me/Negan_Singh" target="_blank" class="admin-float">
        ● CONNECT TO ADMIN
    </a>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const progressBar = document.getElementById('progress-bar');

        // Mouse Tracker
        function handleMove(e) {
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
        }
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove);

        // Security: Block Keyboard Shortcuts
        document.addEventListener('keydown', function(e) {
            if (
                e.keyCode === 123 || // F12
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || // Inspect
                (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 65 || e.keyCode === 70)) // View Source, Save, Select All, Find
            ) {
                e.preventDefault();
                return false;
            }
        });

        // 4 Second Logic
        window.onload = () => {
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 100);

            setTimeout(() => {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('security-alert').style.display = 'block';
            }, 4100);
        };
    </script>
</body>
</html>
