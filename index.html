<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3-Column Secure Grid</title>
    <style>
        /* --- 1. Base Reset & Dark Theme --- */
        :root {
            --bg-main: #000000;
            --card-border: #222;
            --text-color: #fff;
            --accent-color: #00d26a; /* MEGA style green for highlights */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap box on Android */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-color);
            font-family: sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        /* Simple Header */
        header {
            text-align: center;
            padding: 12px;
            background: #0a0a0a;
            border-bottom: 1px solid var(--card-border);
        }
        h1 { margin: 0; font-size: 1rem; font-weight: 600; }
        p { margin: 4px 0 0; font-size: 0.75rem; color: #888; }
        .secure-badge { color: var(--accent-color); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- 2. THE 3-COLUMN GRID SETUP --- */
        .grid-container {
            display: grid;
            /* ⚠️ STRICT RULE: Always 3 columns, even on small mobiles */
            grid-template-columns: repeat(3, 1fr);
            gap: 4px; /* Gap bahut kam rakha hai taaki video ko jagah mile */
            padding: 5px;
            max-width: 800px; /* PC par zyada failne se rokna */
            margin: 0 auto;
        }

        /* --- 3. Video Card Wrapper --- */
        .video-card {
            position: relative;
            background: #111;
            border-radius: 4px; /* Thoda sa rounded corner */
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        /* Aspect Ratio Box (16:9) */
        .video-box {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Creates the 16:9 height automatically */
            background: #000;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* --- 4. 🛡️ PRECISION SECURITY MASKS (Smart Logic) --- */
        /*
           Logic: Masks sirf top area me rahenge.
           Bottom 75% area khula rahega for Play/Pause/Settings/Fullscreen.
        */

        .mask {
            position: absolute;
            top: 0;
            height: 25%; /* ⚠️ ONLY covers top 25%. Center/Bottom is free. */
            z-index: 50; /* Iframe ke upar rahega */
            background: transparent; /* Invisible */
            /* background: rgba(255, 0, 0, 0.3); /* Debug: Uncomment to see the red security zones */
            cursor: default;
        }

        /* Top Right: Blocks Share Button & Link text */
        .mask-share {
            right: 0;
            width: 40%; /* Thoda choda rakha hai taaki lamba link text bhi cover ho */
        }

        /* Top Left: Blocks MEGA Logo */
        .mask-logo {
            left: 0;
            width: 25%;
        }

        /* Card Title (Optional, very small for 3-col layout) */
        .card-title {
            font-size: 9px;
            padding: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
            background: #0a0a0a;
        }

    </style>
</head>
