<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --red:#df2531;
  --black:#000;
}

/* Base */
body{
  margin:0;
  background:radial-gradient(circle at center,#1a0505 0%,#000 70%);
  overflow-x:hidden;
  touch-action:manipulation;
}

/* Scanlines */
.scanlines{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,.35) 50%),
    linear-gradient(90deg,rgba(223,37,49,.08),transparent);
  background-size:100% 2px,3px 100%;
  pointer-events:none;
  z-index:999;
}

/* Gallery cards */
.card{
  background:#000;
  border:1px solid #111;
  overflow:hidden;
  transition:transform .2s ease, box-shadow .2s ease;
  will-change:transform;
}
.card:hover{
  border-color:var(--red);
  box-shadow:0 0 20px rgba(223,37,49,.45);
}
.card:active{
  transform:scale(.94);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.9;
  transition:transform .4s ease, opacity .3s ease;
  will-change:transform;
}
.card:hover img{
  transform:scale(1.1);
  opacity:1;
}

/* Modal */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
#modal img{
  max-width:100%;
  max-height:100%;
  border:1px solid rgba(223,37,49,.4);
  box-shadow:0 0 40px rgba(223,37,49,.5);
}

/* CURSOR SYSTEM */
.cursor-core{
  position:fixed;
  width:8px;
  height:8px;
  background:var(--red);
  border-radius:50%;
  pointer-events:none;
  z-index:2000;
  transform:translate(-50%,-50%);
}
.cursor-ring{
  position:fixed;
  width:36px;
  height:36px;
  border:1px solid rgba(223,37,49,.5);
  border-radius:50%;
  pointer-events:none;
  z-index:1999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 30px rgba(223,37,49,.4);
}

/* Click ripple */
.ripple{
  position:fixed;
  width:10px;
  height:10px;
  border:2px solid rgba(223,37,49,.7);
  border-radius:50%;
  pointer-events:none;
  animation:ripple .5s ease-out forwards;
  z-index:1998;
}
@keyframes ripple{
  to{
    transform:scale(6);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="scanlines"></div>

<!-- CURSOR -->
<div class="cursor-ring" id="ring"></div>
<div class="cursor-core" id="core"></div>

<!-- TOP LOGO -->
<header class="flex justify-center py-4">
  <img src="logo.png" class="h-10" alt="">
</header>



<!-- GALLERY -->
<main class="max-w-7xl mx-auto px-1 pb-20">
  <div id="gallery" class="grid grid-cols-4 gap-[2px]"></div>
</main>

<!-- MODAL -->
<div id="modal">
  <img id="modalImg">
</div>

<script>
lucide.createIcons();

/* Local images */
const images = Array.from({length:10},(_,i)=>`images/${i+1}.png`);

const gallery = document.getElementById('gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

/* Render instantly */
images.forEach(src=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`<img src="${src}" loading="eager">`;
  d.onclick=()=>openModal(src);
  gallery.appendChild(d);
});

/* Modal */
function openModal(src){
  modalImg.src=src;
  modal.style.display='flex';
  history.pushState({m:1},'');
}
modal.onclick=()=>closeModal();
function closeModal(){
  modal.style.display='none';
  modalImg.src='';
}
window.onpopstate=()=>{ if(modal.style.display==='flex') closeModal(); };

/* CURSOR LOGIC */
const core=document.getElementById('core');
const ring=document.getElementById('ring');
let x=0,y=0,tx=0,ty=0;

function animate(){
  x+=(tx-x)*0.2;
  y+=(ty-y)*0.2;
  core.style.left=x+'px';
  core.style.top=y+'px';
  ring.style.left=x+'px';
  ring.style.top=y+'px';
  requestAnimationFrame(animate);
}
animate();

/* Mouse */
document.addEventListener('mousemove',e=>{
  tx=e.clientX;
  ty=e.clientY;
});

/* Touch */
document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
});
document.addEventListener('touchmove',e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
});

/* Click ripple */
document.addEventListener('click',e=>{
  const r=document.createElement('div');
  r.className='ripple';
  r.style.left=e.clientX+'px';
  r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(),500);
});
</script>

</body>
</html>
